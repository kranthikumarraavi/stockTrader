<!-- Brand -->
<div class="sidebar-brand">
  <i class="bi bi-triangle-fill brand-icon"></i>
  <span class="brand-text">StockTrader</span>
  <button class="sidebar-toggle d-none d-lg-flex" (click)="toggleCollapse()" title="Toggle sidebar">
    <i class="bi bi-chevron-left"></i>
  </button>
</div>

<!-- Navigation groups -->
<nav class="sidebar-nav" aria-label="Main navigation">
  @for (group of groups; track group.heading) {
    <div class="nav-group-heading" role="heading" aria-level="2">{{ group.heading }}</div>
    @for (item of group.items; track item.route) {
      <a class="nav-item"
         [routerLink]="item.route"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: item.route === '/' }"
         (click)="onNavClick()"
         [attr.aria-label]="item.label">
        <i class="bi nav-icon" [ngClass]="'bi-' + item.icon" aria-hidden="true"></i>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  }
</nav>
