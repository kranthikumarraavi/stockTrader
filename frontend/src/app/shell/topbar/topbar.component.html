<!-- Hamburger (mobile only) -->
<button class="topbar-hamburger" (click)="menuToggle.emit()" title="Menu">
  <i class="bi bi-list"></i>
</button>

<!-- Symbol search -->
<div class="topbar-search" (appClickOutside)="closeSearchDropdown()">
  <i class="bi bi-search search-icon"></i>
  <input type="text"
         placeholder="Search symbol… (e.g. RELIANCE, NIFTY)"
         [value]="searchQuery"
         (input)="onSearchInput($event)"
         (focus)="onSearchFocus()"
         (keydown)="onSearchKeydown($event)"
         aria-label="Search symbol" />
  <button type="button" class="kbd-hint d-none d-lg-inline topbar-search__command-btn" (click)="triggerCommandPalette()">
    Ctrl+K
  </button>

  @if (showSearchDropdown) {
    <div class="topbar-search__dropdown">
      @if (filteredSymbols.length === 0) {
        <div class="topbar-search__empty">No matching symbols</div>
      } @else {
        @for (symbol of filteredSymbols; track symbol) {
          <button
            type="button"
            class="topbar-search__item"
            [class.topbar-search__item--active]="$index === activeSuggestion"
            (mouseenter)="activeSuggestion = $index"
            (click)="selectSuggestion(symbol)"
          >
            <span class="topbar-search__item-symbol">{{ symbol }}</span>
            <span class="topbar-search__item-open">Open chart</span>
          </button>
        }
      }
    </div>
  }
</div>

<span class="topbar-spacer"></span>

<!-- Quick actions -->
<div class="topbar-actions d-none d-md-flex">
  <button class="action-btn" (click)="quickTrade.emit()" title="Quick trade (Ctrl+Shift+O)">
    <i class="bi bi-lightning-fill"></i>
    <span class="action-label">Trade</span>
  </button>
  <button class="action-btn" (click)="refresh.emit()" title="Refresh data">
    <i class="bi bi-arrow-clockwise"></i>
  </button>
  <button class="action-btn" (click)="toggleTheme.emit()" [title]="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
    <i class="bi" [ngClass]="darkMode ? 'bi-sun' : 'bi-moon'"></i>
  </button>
  <button class="action-btn" (click)="triggerCommandPalette()" title="Command palette">
    <i class="bi bi-command"></i>
    <span class="action-label">Command</span>
  </button>
</div>

<!-- Market session badge -->
<div class="market-badge"
     [ngClass]="{
       'market-open':   marketPhase === 'open',
       'market-closed': marketPhase === 'closed' || marketPhase === 'holiday' || marketPhase === 'weekend',
       'market-pre':    marketPhase === 'pre_open' || marketPhase === 'post_close'
     }">
  <span class="badge-dot"></span>
  <span class="badge-label">{{ marketPhaseLabel }}</span>
</div>

<div class="status-pill" [ngClass]="wsConnected ? 'status-pill--ok' : 'status-pill--warn'">
  <i class="bi" [ngClass]="wsConnected ? 'bi-wifi' : 'bi-wifi-off'"></i>
  {{ wsConnected ? 'Live WS' : 'WS Down' }}
</div>

<div class="status-pill" [ngClass]="apiStatus === 'ok' ? 'status-pill--ok' : 'status-pill--err'">
  <i class="bi bi-hdd-network"></i>
  API {{ apiStatus | uppercase }}
</div>

<!-- Notifications -->
<button class="topbar-bell" title="Notifications" (click)="notificationsToggle.emit()">
  <i class="bi bi-bell"></i>
  @if (unreadCount > 0) {
    <span class="bell-badge">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
  }
</button>

<!-- Account -->
<div class="topbar-account" title="Account">
  <div class="account-avatar">ST</div>
  <span class="account-name">Trader</span>
  <i class="bi bi-chevron-down" style="font-size: 0.6rem; color: #9e9e9e;"></i>
</div>
