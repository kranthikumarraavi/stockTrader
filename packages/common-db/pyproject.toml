[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "common-db"
version = "0.1.0"
description = "Shared database session and models for StockTrader microservices"
requires-python = ">=3.11"
dependencies = ["sqlalchemy>=2.0", "psycopg2-binary>=2.9"]

[tool.setuptools.packages.find]
include = ["common_db*"]
