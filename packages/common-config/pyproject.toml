[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "common-config"
version = "0.1.0"
description = "Shared configuration for StockTrader microservices"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.0", "pydantic-settings>=2.0", "python-dotenv>=1.0"]

[tool.setuptools.packages.find]
include = ["common_config*"]
